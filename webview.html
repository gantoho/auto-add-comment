<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Add Comment Settings</title>
    <link rel="stylesheet" href="./webview.css">
</head>
<body>
    <div class="container {{status === 'Enabled' ? 'enabled' : 'disabled'}}">
        <h1>Auto Add Comment Settings</h1>
        <p>This extension automatically adds custom comments to files when saved.</p>

        <div class="section">
            <div class="section-title flex">
                <span>General Settings</span>
            </div>
            <div class="toggle-container">
                <div class="info">
                    <span class="toggle-label">Enable Auto Add Comment</span>
                    <span class="status {{status === 'Enabled' ? 'enabled' : 'disabled'}}">{{status}}</span>
                </div>
                <div class="toggle-content">
                    <label class="toggle-switch">
                        <input type="checkbox" {{enabled}} id="enableToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">Comment Settings</div>
            <div class="form-group">
                <label class="form-label">Comment Marker</label>
                <input type="text" class="form-input" id="commentMarker" value="{{commentMarker}}" placeholder="Unique marker for comments">
            </div>
            <div class="form-group">
                <label class="form-label">Time Offset (minutes)</label>
                <input type="number" class="form-input" id="timeOffset" value="{{timeOffset}}" placeholder="Time offset in minutes">
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">Comment Templates</div>
            <div class="templates-container" id="templatesContainer">
                {{templates}}
            </div>
            <button class="add-template" id="addTemplate">Add Template</button>
        </div>
        
        <div class="button-group">
            <button class="save-button" id="saveButton">Save Settings</button>
            <button class="save-button button-secondary" id="openSettingsButton">Open VS Code Settings</button>
            <button class="save-button" id="resetButton">Reset to Default</button>
        </div>
    </div>
    
    <script src="./webview.js"></script>
</body>
</html>
